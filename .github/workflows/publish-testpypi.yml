name: Test release (TestPyPI)

on:
  workflow_dispatch:

permissions:
  contents: read

# Builds the full wheel matrix + sdist, uploads artifacts for inspection,
# and publishes to TestPyPI (https://test.pypi.org) for end-to-end validation
# before a real PyPI release.  Requires this repo to be configured as a
# trusted publisher on TestPyPI.

jobs:
  build_wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: "x86_64 aarch64"
          - os: macos-13
            archs: "x86_64"
          - os: macos-14
            archs: "arm64"
          - os: windows-latest
            archs: "AMD64"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
        run: uvx --with cibuildwheel==2.23.3 cibuildwheel --output-dir dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-wheels-${{ matrix.os }}
          path: dist/*.whl

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build source distribution
        run: uv build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-sdist
          path: dist/*.tar.gz

  publish:
    name: publish to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: testpypi-*
          merge-multiple: true

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
